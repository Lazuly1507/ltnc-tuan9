name: Java CI with Maven

on: [ push, pull_request ]

jobs:
  test-on-matrix:
    strategy:
      # Matrix sẽ tạo ra 3 jobs chạy song song
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven (Test & Package)
        run: mvn -B package --file pom.xml

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: output-jar-file
          path: target/*.jar

      - name: Build with Maven and Check Coverage
        # verify sẽ kích hoạt jacoco:check, nếu < 80% build sẽ báo FAIL ở đây
        run: mvn clean verify

      - name: Upload JaCoCo Coverage Report
        # Bước này chạy kể cả khi build fail hoặc thành công để bạn xem lý do thiếu coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
